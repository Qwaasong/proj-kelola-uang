<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Laeva</title>

    <!-- Google Fonts: Figtree -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Konfigurasi Tema Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#408A71',
                        secondary: '#091413',
                        bgMain: '#F5F7F6',
                        barChart: '#639E88',
                        lineBlue: '#8093F1',
                        lineRed: '#FF8A8A'
                    },
                    fontFamily: {
                        sans: ['Figtree', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Phosphor Icons (Web Font) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="text-secondary font-sans antialiased overflow-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const mainMenus = [
            { id: 1, name: 'Dashboard', icon: 'ph-house', active: true },
            { id: 2, name: 'Dompet', icon: 'ph-wallet', active: false },
            { id: 3, name: 'Transaksi', icon: 'ph-arrows-left-right', active: false },
            { id: 4, name: 'Dana Darurat', icon: 'ph-stack', active: false },
            { id: 5, name: 'Laporan', icon: 'ph-file-text', active: false },
        ];

        const footerMenus = [
            { id: 6, name: 'Help', icon: 'ph-question', colorClass: 'text-gray-500 hover:text-secondary' },
            { id: 7, name: 'Logout Account', icon: 'ph-sign-out', colorClass: 'text-[#E74C3C]' },
        ];

        // --- KOMPONEN: Sidebar ---
        const Sidebar = ({ isOpen, toggleSidebar }) => {
            return (
                <div className={`bg-white h-screen border-r border-gray-100 flex flex-col flex-shrink-0 relative transition-all duration-300 ease-in-out z-20 ${isOpen ? 'w-[260px]' : 'w-[88px]'}`}>
                    
                    {/* Tombol Buka Tutup (Collapse) */}
                    <div 
                        onClick={toggleSidebar}
                        className="absolute -right-3.5 top-8 w-7 h-7 bg-white border border-gray-200 rounded-full flex items-center justify-center cursor-pointer shadow-sm hover:bg-gray-50 transition-colors z-30"
                    >
                        <i className={`ph ${isOpen ? 'ph-caret-left' : 'ph-caret-right'} text-gray-400 text-sm`}></i>
                    </div>

                    {/* Logo */}
                    <div className={`flex items-center pt-8 pb-6 transition-all duration-300 h-[88px] ${isOpen ? 'px-8 gap-2 justify-start' : 'justify-center'}`}>
                        <div className="flex items-end h-5 gap-[2px] flex-shrink-0">
                            <div className="w-[6px] h-2.5 bg-secondary"></div>
                            <div className="w-2.5 h-[18px] border-t-[3px] border-r-[3px] border-secondary"></div>
                        </div>
                        <span className={`text-xl font-bold tracking-widest uppercase ml-1 transition-all duration-300 overflow-hidden whitespace-nowrap ${isOpen ? 'w-auto opacity-100' : 'w-0 opacity-0'}`}>
                            LAEVA
                        </span>
                    </div>

                    {/* Pembatas (Divider) */}
                    <div className="px-6 w-full mb-6">
                        <hr className="border-gray-100" />
                    </div>

                    {/* Menu Utama */}
                    <div className="flex flex-col flex-grow">
                        
                    <div className="mb-2 overflow-hidden">
                        <div className="px-8 text-left">
                            <p
                                className={`font-bold text-gray-400 uppercase tracking-widest text-[11px] transition-transform duration-300 ${
                                    isOpen ? 'translate-x-[0px]' : 'translate-x-[-6px]'
                                }`}
                            >
                                MAIN
                            </p>
                        </div>
                    </div>
                        <ul className="space-y-2 flex flex-col items-center w-full px-4">
                            {mainMenus.map((menu) => (
                                <li 
                                    key={menu.id} 
                                    className={`group relative flex items-center h-12 w-full rounded-xl cursor-pointer transition-colors duration-200 ${
                                        menu.active 
                                            ? 'bg-[#F0F7F4] text-primary font-semibold' 
                                            : 'text-gray-500 hover:text-secondary hover:bg-gray-50'
                                    }`}
                                >
                                    {/* Ikon */}
                                    <div className="w-[56px] h-full flex items-center justify-center flex-shrink-0">
                                        <i className={`ph ${menu.icon} text-[22px]`}></i>
                                    </div>

                                    {/* Text normal */}
                                    <span className={`text-[14px] whitespace-nowrap overflow-hidden transition-all duration-300 ${
                                        isOpen ? 'w-full opacity-100' : 'w-0 opacity-0'
                                    }`}>
                                        {menu.name}
                                    </span>

                                    {/* Tooltip */}
                                    {!isOpen && (
                                        <div className="
                                            absolute left-[70px] 
                                            bg-secondary text-white text-[12px] 
                                            px-3 py-1.5 rounded-md 
                                            whitespace-nowrap
                                            opacity-0 translate-x-[-8px]
                                            group-hover:opacity-100 group-hover:translate-x-0
                                            transition-all duration-200
                                            pointer-events-none
                                            shadow-md
                                        ">
                                            {menu.name}
                                            <div className="absolute left-[-4px] top-1/2 -translate-y-1/2 w-2 h-2 bg-secondary rotate-45"></div>
                                        </div>
                                    )}
                                </li>
                            ))}
                        </ul>
                    </div>

                    {/* Footer Menu (Help & Logout) */}
                    <div className="pb-8 space-y-2 flex flex-col items-center w-full px-4">
                        {footerMenus.map((menu) => (
                            <div 
                                key={menu.id} 
                                className={`flex items-center h-12 w-full rounded-xl cursor-pointer transition-colors duration-200 hover:bg-gray-50 ${menu.colorClass}`}
                            >
                                <div className="w-[56px] h-full flex items-center justify-center flex-shrink-0">
                                    <i className={`ph ${menu.icon} text-[22px]`}></i>
                                </div>
                                <span className={`text-[14px] font-medium whitespace-nowrap overflow-hidden transition-all duration-300 ${isOpen ? 'w-full opacity-100' : 'w-0 opacity-0'}`}>
                                    {menu.name}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- KOMPONEN: Card Summary ---
        const SummaryCard = ({ title, amount }) => (
            <div className="bg-white p-6 rounded-[20px] shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)] w-full hover:shadow-[0_8px_30px_-10px_rgba(0,0,0,0.08)] transition-shadow cursor-pointer">
                <h3 className="text-sm font-semibold mb-2">{title}</h3>
                <p className="text-[28px] font-semibold flex items-baseline gap-1">
                    <span className="text-sm text-gray-400 font-medium">Rp</span> {amount}
                </p>
            </div>
        );

        // --- KOMPONEN: Chart Bar ---
        const BarChart = () => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                
                chartInstance.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Makan dan Minum', 'Transportasi', 'Dana Darurat', 'Goal', 'Langganan'],
                        datasets: [{
                            label: 'Semua Dana',
                            data: [35, 88, 93, 80, 58],
                            backgroundColor: '#639E88',
                            barThickness: 45,
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 100,
                                ticks: { stepSize: 20, font: { size: 11, family: 'Figtree' }, color: '#9CA3AF' },
                                border: { display: false },
                                grid: { color: 'transparent' }
                            },
                            x: {
                                grid: { display: false },
                                border: { color: '#E5E7EB' },
                                ticks: { font: { size: 11, family: 'Figtree' }, color: '#6B7280' }
                            }
                        }
                    }
                });
                return () => { if(chartInstance.current) chartInstance.current.destroy(); }
            }, []);

            return (
                <div className="bg-white p-6 rounded-[20px] shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)] w-full lg:w-[60%] flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex items-center gap-2">
                            <h2 className="text-[16px] font-semibold">Distribusi Dana</h2>
                            <i className="ph ph-info text-gray-400 text-lg cursor-pointer hover:text-gray-600"></i>
                        </div>
                        <button className="bg-secondary text-white text-[12px] px-4 py-2 rounded-lg font-medium hover:bg-opacity-90 transition">Lihat Laporan</button>
                    </div>
                    <div className="flex-grow w-full h-[250px] relative">
                        <canvas ref={chartRef}></canvas>
                    </div>
                    <div className="flex justify-end mt-4">
                        <div className="flex items-center gap-2 text-[12px] text-gray-500 font-medium">
                            <span className="w-3 h-3 bg-barChart inline-block rounded-sm"></span> Semua Dana
                        </div>
                    </div>
                </div>
            );
        };

        // --- KOMPONEN: Chart Line Area ---
        const LineChart = () => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');

                const gradBlue = ctx.createLinearGradient(0, 0, 0, 150);
                gradBlue.addColorStop(0, 'rgba(128, 147, 241, 0.2)');
                gradBlue.addColorStop(1, 'rgba(128, 147, 241, 0)');

                const gradRed = ctx.createLinearGradient(0, 0, 0, 150);
                gradRed.addColorStop(0, 'rgba(255, 138, 138, 0.2)');
                gradRed.addColorStop(1, 'rgba(255, 138, 138, 0)');

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['12 AM', '8 AM', '4 PM', '8 PM'],
                        datasets: [
                            {
                                label: 'Pengeluaran',
                                data: [125, 80, 175, 105],
                                borderColor: '#FF8A8A',
                                backgroundColor: gradRed,
                                borderWidth: 2,
                                fill: true,
                                tension: 0.1,
                                pointRadius: 0,
                            },
                            {
                                label: 'Pemasukan',
                                data: [42, 55, 80, 52],
                                borderColor: '#8093F1',
                                backgroundColor: gradBlue,
                                borderWidth: 2,
                                fill: true,
                                tension: 0.1,
                                pointRadius: 0,
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: 200,
                                ticks: { stepSize: 100, font: { size: 10, family: 'Figtree' }, color: '#9CA3AF' },
                                border: { display: false },
                                grid: { color: '#E5E7EB', tickLength: 0 }
                            },
                            x: {
                                grid: { color: '#E5E7EB', drawBorder: false, borderDash: [4, 4] },
                                border: { color: '#E5E7EB' },
                                ticks: { font: { size: 10, family: 'Figtree' }, color: '#6B7280', padding: 10 }
                            }
                        }
                    }
                });
                return () => { if(chartInstance.current) chartInstance.current.destroy(); }
            }, []);

            return (
                <div className="bg-white p-6 rounded-[20px] shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)] w-full lg:w-[40%] flex flex-col">
                    <div className="flex justify-between items-center mb-4">
                        <div className="flex items-center gap-2">
                            <h2 className="text-[16px] font-semibold">Transaksi Hari Ini</h2>
                            <i className="ph ph-info text-gray-400 text-lg cursor-pointer hover:text-gray-600"></i>
                        </div>
                        <button className="bg-secondary text-white text-[12px] px-4 py-2 rounded-lg font-medium hover:bg-opacity-90 transition">Lihat Laporan</button>
                    </div>
                    
                    <div className="mb-5">
                        <p className="text-[28px] font-semibold flex items-baseline gap-1">
                            <span className="text-sm text-gray-400 font-medium">Rp</span> 985.000
                        </p>
                    </div>

                    <div className="space-y-3 mb-6 text-[13px] font-medium">
                        <div className="flex justify-between">
                            <span className="text-gray-600">Makan dan Minum</span>
                            <span>Rp 100.000</span>
                        </div>
                        <div className="flex justify-between">
                            <span className="text-gray-600">Transportasi</span>
                            <span>Rp 100.000</span>
                        </div>
                        <div className="flex justify-between">
                            <span className="text-gray-600">Lainya</span>
                            <span>Rp 12.000</span>
                        </div>
                    </div>

                    <div className="flex-grow w-full h-[150px] relative mt-auto">
                        <canvas ref={chartRef}></canvas>
                    </div>

                    <div className="flex justify-center gap-6 mt-4">
                        <div className="flex items-center gap-2 text-[11px] text-gray-500 font-medium">
                            <span className="w-4 h-[2px] bg-lineBlue inline-block"></span> Pemasukan
                        </div>
                        <div className="flex items-center gap-2 text-[11px] text-gray-500 font-medium">
                            <span className="w-4 h-[2px] bg-lineRed inline-block"></span> Pengeluaran
                        </div>
                    </div>
                </div>
            );
        };

        // --- KOMPONEN UTAMA ---
        const App = () => {
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);

            return (
                <div className="flex h-screen bg-bgMain font-sans">
                    
                    <Sidebar 
                        isOpen={isSidebarOpen} 
                        toggleSidebar={() => setIsSidebarOpen(!isSidebarOpen)} 
                    />
                    
                    <div className="flex-1 flex flex-col h-screen overflow-y-auto">
                        
                        <div className="flex justify-between items-center px-8 py-8">
                            <h1 className="text-2xl font-semibold">Dashboard</h1>
                            <div className="flex gap-3">
                                <button className="bg-primary text-white text-[13px] px-5 py-2.5 rounded-lg font-medium hover:bg-opacity-90 transition shadow-sm">
                                    Tambah Transaksi
                                </button>
                                <button className="bg-secondary text-white text-[13px] px-5 py-2.5 rounded-lg font-medium hover:bg-opacity-90 transition shadow-sm">
                                    Transfer Dana
                                </button>
                            </div>
                        </div>

                        <div className="px-8 pb-10 flex flex-col gap-6 w-full max-w-[1400px]">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                <SummaryCard title="Pemasukan" amount="120.000" />
                                <SummaryCard title="Pengeluaran" amount="786.000" />
                                <SummaryCard title="Dana Darurat" amount="567.000" />
                                <SummaryCard title="Total Saldo" amount="23.568.000" />
                            </div>

                            <div className="flex flex-col xl:flex-row gap-6 items-stretch">
                                <BarChart />
                                <LineChart />
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
