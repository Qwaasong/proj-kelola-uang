<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi - Laeva</title>

    <!-- Google Fonts: Figtree -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Konfigurasi Tema Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#408A71',
                        secondary: '#091413',
                        bgMain: '#F5F7F6',
                        borderLight: '#E5E7EB',
                    },
                    fontFamily: {
                        sans: ['Figtree', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Phosphor Icons (Web Font) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="text-secondary font-sans antialiased overflow-hidden">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KOMPONEN: Baris Tabel (Row) ---
        const TableRow = ({ index, row, totalRows, isSelected, onToggleSelect }) => {
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const dropdownRef = useRef(null);

            // Menutup dropdown klik diluar area
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsDropdownOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => {
                    document.removeEventListener('mousedown', handleClickOutside);
                };
            }, []);

            // Logika Drop-Up: Jika ini adalah baris ke-1 atau ke-2 terakhir, menu akan muncul ke atas
            const isNearBottom = index >= totalRows - 2;

            return (
                <tr className={`border-b border-borderLight transition-colors last:border-0 ${isSelected ? 'bg-[#F0F7F4]/40' : 'hover:bg-gray-50/70'}`}>
                    
                    {/* Checkbox Kolom */}
                    <td className="py-3.5 pl-5 pr-2">
                        <input 
                            type="checkbox" 
                            checked={isSelected}
                            onChange={() => onToggleSelect(row.id)}
                            className="w-[15px] h-[15px] rounded border-gray-300 accent-primary cursor-pointer"
                        />
                    </td>
                    
                    <td className="py-3.5 px-4">{index + 1}</td>
                    <td className="py-3.5 px-6 font-medium">{row.type}</td>
                    <td className="py-3.5 px-6">{row.wallet}</td>
                    <td className="py-3.5 px-6">{row.amount}</td>
                    <td className="py-3.5 px-6 text-gray-500">{row.date}</td>
                    
                    {/* Kolom Aksi */}
                    <td className="py-3.5 px-6 text-center relative" ref={dropdownRef}>
                        <button 
                            onClick={() => setIsDropdownOpen(!isDropdownOpen)}
                            className={`w-8 h-8 rounded-md flex items-center justify-center transition-colors mx-auto ${isDropdownOpen ? 'bg-gray-200' : 'hover:bg-gray-100'}`}
                        >
                            <i className="ph ph-dots-three-vertical text-lg text-gray-500"></i>
                        </button>

                        {/* Dropdown Menu (Posisi Dinamis: Top / Bottom) */}
                        {isDropdownOpen && (
                            <div className={`absolute right-8 w-32 bg-white rounded-lg shadow-[0_4px_15px_rgba(0,0,0,0.1)] border border-gray-100 py-1 z-[50] animate-[fadeIn_0.15s_ease-out] ${isNearBottom ? 'bottom-8' : 'top-10'}`}>
                                <button className="w-full text-left px-4 py-2 text-[13px] font-medium text-secondary hover:bg-gray-50 transition-colors flex items-center gap-2">
                                    <i className="ph ph-pencil-simple text-gray-400"></i> Edit
                                </button>
                                <button className="w-full text-left px-4 py-2 text-[13px] font-medium text-[#E74C3C] hover:bg-red-50 transition-colors flex items-center gap-2">
                                    <i className="ph ph-trash text-[#E74C3C]"></i> Delete
                                </button>
                            </div>
                        )}
                    </td>
                </tr>
            );
        };

        // --- KOMPONEN UTAMA ---
        const App = () => {
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [selectedRows, setSelectedRows] = useState([]); // State untuk Checkbox
            
            // State untuk Bulk Action Dropdown
            const [isBulkDropdownOpen, setIsBulkDropdownOpen] = useState(false);
            const bulkRef = useRef(null);

            // Data Dummy Transaksi
            const transactionData = [
                { id: 1, type: 'Pemasukan', wallet: 'BCA', amount: '120.000', date: '30 Maret 2026' },
                { id: 2, type: 'Pemasukan', wallet: 'BCA', amount: '120.000', date: '30 Maret 2026' },
                { id: 3, type: 'Pemasukan', wallet: 'BCA', amount: '120.000', date: '30 Maret 2026' },
                { id: 4, type: 'Pemasukan', wallet: 'BCA', amount: '120.000', date: '30 Maret 2026' },
                { id: 5, type: 'Pemasukan', wallet: 'BCA', amount: '120.000', date: '30 Maret 2026' },
            ];

            // Handle Select All Checkbox
            const handleSelectAll = (e) => {
                if (e.target.checked) {
                    setSelectedRows(transactionData.map(row => row.id));
                } else {
                    setSelectedRows([]);
                }
            };

            // Handle Row Checkbox
            const handleToggleSelectRow = (id) => {
                if (selectedRows.includes(id)) {
                    setSelectedRows(selectedRows.filter(rowId => rowId !== id));
                } else {
                    setSelectedRows([...selectedRows, id]);
                }
            };

            // Menutup dropdown Bulk Action klik diluar area
            useEffect(() => {
                const handleClickOutside = (event) => {
                    if (bulkRef.current && !bulkRef.current.contains(event.target)) {
                        setIsBulkDropdownOpen(false);
                    }
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => {
                    document.removeEventListener('mousedown', handleClickOutside);
                };
            }, []);

            return (
                <div className="flex h-screen bg-bgMain font-sans">
                    
                    <div className="flex-1 flex flex-col h-screen overflow-y-auto">
                        
                        <div className="flex justify-between items-center px-8 py-8 flex-shrink-0">
                            <h1 className="text-2xl font-semibold">Transaksi</h1>
                            <button className="bg-primary text-white text-[13px] px-5 py-2.5 rounded-lg font-medium hover:bg-opacity-90 transition shadow-sm">
                                Tambah Transaksi
                            </button>
                        </div>

                        <div className="px-8 pb-10 w-full max-w-[1400px]">
                            
                            <div className="bg-white border border-borderLight rounded-2xl flex flex-col w-full shadow-sm">
                                
                                {/* Toolbar */}
                                <div className="flex justify-between items-center px-5 py-3 border-b border-borderLight flex-wrap gap-4 bg-white rounded-t-2xl">
                                    
                                    <div className="flex items-center gap-3">
                                        {/* Tombol Filter */}
                                        <button className="w-8 h-8 bg-secondary text-white rounded-md flex items-center justify-center hover:bg-opacity-90 transition shadow-sm outline-none">
                                            <i className="ph ph-funnel text-[16px]"></i>
                                        </button>

                                        {/* TAMPILKAN TOMBOL BULK ACTION JIKA ADA BARIS TERPILIH */}
                                        {selectedRows.length > 0 && (
                                            <div className="relative" ref={bulkRef}>
                                                <button 
                                                    onClick={() => setIsBulkDropdownOpen(!isBulkDropdownOpen)}
                                                    className="h-8 px-3 bg-secondary text-white rounded-md flex items-center justify-center gap-2 hover:bg-opacity-90 transition shadow-sm outline-none text-[12px] font-semibold"
                                                >   
                                                    <span>Bulk Action</span>
                                                    <span className="text-white px-1.5 py-[2px] rounded text-[10px]">{selectedRows.length}</span>
                                                    <i className={`ph ph-caret-down text-gray-400 transition-transform ${isBulkDropdownOpen ? 'rotate-180' : ''}`}></i>
                                                </button>

                                                {/* Dropdown Bulk Action */}
                                                {isBulkDropdownOpen && (
                                                    <div className="absolute top-10 left-0 w-36 bg-white rounded-lg shadow-[0_4px_15px_rgba(0,0,0,0.1)] border border-gray-100 py-1 z-20 animate-[fadeIn_0.15s_ease-out]">
                                                        <button className="w-full text-left px-4 py-2 text-[13px] font-medium text-[#E74C3C] hover:bg-red-50 transition-colors flex items-center gap-2">
                                                            <i className="ph ph-trash text-[#E74C3C]"></i> Delete Selected
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    {/* Input Pencarian */}
                                    <div className="flex items-center border border-borderLight rounded-lg px-3 py-1.5 w-full sm:w-[320px] bg-white transition-all focus-within:border-primary focus-within:ring-1 focus-within:ring-primary shadow-sm">
                                        <i className="ph ph-magnifying-glass text-gray-400 mr-2 text-[18px]"></i>
                                        <input 
                                            type="text" 
                                            className="outline-none text-[13px] w-full text-secondary placeholder-gray-400 bg-transparent" 
                                            placeholder="Cari"
                                        />
                                    </div>
                                </div>

                                {/* Area Tabel (Scrollable) */}
                                <div className="w-full overflow-x-auto relative">
                                    {/* min-w-[700px] mencegah tabel hancur saat layar dikecilkan */}
                                    <table className="w-full min-w-[700px] text-left whitespace-nowrap">
                                        
                                        {/* Header Tabel */}
                                        <thead className="bg-bgMain text-[12px] text-gray-500 border-b border-borderLight">
                                            <tr>
                                                <th className="py-3 pl-5 pr-2 w-[40px]">
                                                    <input 
                                                        type="checkbox" 
                                                        checked={selectedRows.length === transactionData.length && transactionData.length > 0}
                                                        onChange={handleSelectAll}
                                                        className="w-[15px] h-[15px] rounded border-gray-300 accent-primary cursor-pointer"
                                                    />
                                                </th>
                                                <th className="py-3 px-4 font-semibold w-[60px]">No</th>
                                                <th className="py-3 px-6 font-semibold">Tipe</th>
                                                <th className="py-3 px-6 font-semibold">Dompet</th>
                                                <th className="py-3 px-6 font-semibold">Jumlah</th>
                                                <th className="py-3 px-6 font-semibold">Tanggal</th>
                                                <th className="py-3 px-6 font-semibold w-[50px]"></th>
                                            </tr>
                                        </thead>
                                        
                                        {/* Body Tabel */}
                                        <tbody className="text-[13px] text-secondary bg-white">
                                            {transactionData.map((row, index) => (
                                                <TableRow 
                                                    key={row.id} 
                                                    index={index} 
                                                    row={row} 
                                                    totalRows={transactionData.length}
                                                    isSelected={selectedRows.includes(row.id)}
                                                    onToggleSelect={handleToggleSelectRow}
                                                />
                                            ))}
                                        </tbody>
                                        
                                    </table>
                                </div>

                                {/* Footer Tabel (Pagination) */}
                                <div className="flex flex-col sm:flex-row justify-between items-center px-5 py-3 border-t border-borderLight gap-4 bg-white rounded-b-2xl">
                                    <span className="text-[12px] text-gray-500 font-medium">
                                        Menampilkan 1 - 10 Dari 5 Hasil
                                    </span>

                                    <div className="flex items-center gap-1.5">
                                        <button className="w-7 h-7 bg-secondary text-white rounded flex items-center justify-center hover:bg-opacity-90 transition">
                                            <i className="ph ph-caret-left text-[12px]"></i>
                                        </button>
                                        
                                        <button className="w-7 h-7 bg-secondary text-white rounded flex items-center justify-center text-[12px] font-medium transition">
                                            1
                                        </button>
                                        <button className="w-7 h-7 bg-secondary text-white rounded flex items-center justify-center text-[12px] font-medium hover:bg-opacity-90 transition">
                                            2
                                        </button>
                                        <button className="w-7 h-7 bg-secondary text-white rounded flex items-center justify-center text-[12px] font-medium hover:bg-opacity-90 transition">
                                            3
                                        </button>
                                        
                                        <button className="w-7 h-7 bg-secondary text-white rounded flex items-center justify-center hover:bg-opacity-90 transition">
                                            <i className="ph ph-caret-right text-[12px]"></i>
                                        </button>
                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    {/* CSS Khusus */}
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Style untuk checkbox bawaan agar sesuai tema (Primary Color) */
        input[type="checkbox"] {
            accent-color: #408A71;
        }
    </style>
</body>
</html>
